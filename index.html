<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="container-profile">

        <div id="logo">
            <h3>Netflix</h3>
        </div>

        <div id="header-profile">
            <h1>Who is watching?</h1>
        </div>

        <div id="list-profile">

            <button class="profile-card" onclick="selectProfile('luly')">
                <div class="profile-image">
                    <img src="images/luly.jpeg">
                </div>
                <div class="profile-name">luly</div>
            </button>

            <button class="profile-card" onclick="selectProfile('bernardo')">
                <div class="profile-image">
                    <img src="images/bernardo.jpeg">
                </div>
                <div class="profile-name">bernardo</div>
            </button>

            <button class="profile-card" onclick="selectProfile('braiaboss')">
                <div class="profile-image">
                    <img src="images/braiax.jpeg">
                </div>
                <div class="profile-name">braiaboss</div>
            </button>

            <button class="profile-card" onclick="selectProfile('batore')">
                <div class="profile-image">
                    <img src="images/batore.jpeg">
                </div>
                <div class="profile-name">batore</div>
            </button>

        </div>

        <div id="footer-profile">
            <button>Manage profiles</button>
        </div>

    </div>
</div>
</body>
</html>
