<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Netflix</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="app">
            <div id="profile-screen">
                <div id="logo">
                    <img src="images/netflix.png" alt="">
                </div>

                <div id="title">
                    <h2>Quem esta assistindo?</h2>
                </div>

                <div id="profiles-list">
                    <div class="profile">
                        <div class="image"><img src="images/braiaboss.png" alt=""></div>
                        <div class="name">braiaboss</div>
                    </div>
                    <div class="profile">
                        <div class="image"><img src="images/batore.jpeg" alt=""></div>
                        <div class="name">batore</div>
                    </div>
                    <div class="profile">
                        <div class="image"><img src="images/luly.jpeg" alt=""></div>
                        <div class="name">luly</div>
                    </div>
                </div>

                <footer id="footer">
                    <button>Gerenciar Perfis</button>
                </footer>
            </div>
        </div>
    </body>
</html>
